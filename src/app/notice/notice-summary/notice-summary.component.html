<article class="notice-card" (click)="onNoticeClick()">
    <div class="notice-icon">
        <svg lucideMegaphone></svg>
    </div>

    <div class="notice-content">
        <h3>{{ noticeData.title }}</h3>

        <p class="notice-date"> {{ noticeData.noticeDate | date:'d MMM yyyy' }} </p>

        <p class="notice-description"> {{ noticeData.description }}</p>
    </div>
</article>
