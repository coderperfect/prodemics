<main class="notice-details-page">
    <a class="back-link" routerLink="/notice"> 
        <svg lucideArrowLeft></svg>
        Back to Notices
    </a>

    <article class="notice-card">
        <div class="notice-icon"> <svg lucideMegaphone></svg> </div>

        <h1>{{ notice().title }}</h1>

        <p class="notice-date"> {{ notice().createdAt | date:'d MMM yyyy' }} </p>

        <div class="divider"></div>

        <p class="notice-description"> {{ notice().description }} </p>
    </article>

    @if (isAdmin()) {
        <section class="notice-actions">
            <button class="btn btn-primary" (click)="onEdit()"> Edit Notice </button>

            <button class="btn btn-danger" (click)="openDeleteModal(deleteNoticeModal)">
                Delete Notice 
            </button>
        </section>
    }

    <ng-template #deleteNoticeModal let-modal>
        <div class="modal-header">
            <h5 class="modal-title">Delete Notice</h5>
            <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
        </div>

        <div class="modal-body">
            Are you sure you want to delete this notice?
            <br>
            <strong>This action cannot be undone.</strong>
        </div>

        <div class="modal-footer">
            <button class="btn btn-secondary" (click)="modal.dismiss()"> Cancel </button>

            <button class="btn btn-danger" (click)="confirmDelete(modal)"> Delete </button>
        </div>
    </ng-template>
</main>
