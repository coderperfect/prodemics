<main class="notice-details-page">
    <a class="back-link" routerLink="/notice"> 
        <svg lucideArrowLeft></svg>
        Back to Notices
    </a>

    <article class="notice-card">
        <div class="notice-icon"> <svg lucideMegaphone></svg> </div>

        <h1>{{ notice().title }}</h1>

        <p class="notice-date"> {{ notice().createdAt | date:'d MMM yyyy' }} </p>

        <div class="divider"></div>

        <p class="notice-description"> {{ notice().description }} </p>
    </article>

    @if (isAdmin()) {
        <section class="notice-actions">
            <button class="btn btn-edit" (click)="onEdit()"> Edit Notice </button>

            <button class="btn btn-delete" (click)="openDeleteModal(deleteNoticeModal)">
                Delete Notice 
            </button>
        </section>
    }

    <ng-template #deleteNoticeModal let-modal>
        <div class="delete-modal">
            <h2 class="modal-title">
                Delete Notice
            </h2>

            <p class="modal-description">
                Are you sure you want to delete
                <strong>"{{ notice().title }}"</strong>?
            </p>

            <p class="modal-warning">
                This action cannot be undone.
            </p>

            <div class="modal-actions">
                <button
                    class="btn btn-cancel"
                    (click)="modal.dismiss()">
                    Cancel
                </button>

                <button
                    class="btn btn-confirm-delete"
                    (click)="confirmDelete(modal)">
                    Delete
                </button>
            </div>
        </div>
    </ng-template>
</main>
