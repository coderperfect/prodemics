<main class="home-page">
    <section class="dashboard">
        <header class="dashboard-header">
            <h1>Welcome to Prodemics</h1>
            <p>Choose a module to continue.</p>
        </header>

        <section class="dashboard-cards">
            <app-dashboard-card title="Notices" routerLink="notice"> 
                <svg lucideMegaphone></svg>
            </app-dashboard-card>

            <app-dashboard-card title="Attendance" [comingSoon]="true">
                <svg lucideClipboardCheck></svg>
            </app-dashboard-card>

            <app-dashboard-card title="Timetable" [comingSoon]="true">
                <svg lucideCalendarDays></svg>
            </app-dashboard-card>

            <app-dashboard-card title="Assignments" [comingSoon]="true">
                <svg lucideBookOpen></svg>
            </app-dashboard-card>
        </section>
    </section>
</main>
