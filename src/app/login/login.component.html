<main class="login-page">
    <section class="login-card">
        <header class="login-header">
            <h1>Welcome back</h1>
            <p>Sign in to continue to Prodemics.</p>
        </header>

        <form (ngSubmit)="onSubmit(f)" #f="ngForm">
        @if (isError) {
          <div class="alert alert-danger" role="alert">Username/Password is incorrect!</div>
        }
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" ngModel name="username" class="form-control" />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" ngModel name="password" class="form-control" />
        </div>
        @if (!isLoggingIn) {
          <button type="submit" class="btn btn-primary">Sign in</button>
        }
        @if (isLoggingIn) {
          <button class="btn btn-primary" type="button" disabled>
            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
            Signing in...
          </button>
        }
      </form>
    </section>
</main>
